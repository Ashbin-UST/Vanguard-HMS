<div class="page">

  <div class="login-container">

    <!-- LEFT SIDE -->
    <div class="left-panel">

      <div class="image-section">
        <img
          src="/loginpic2.jpg"
          alt="doctor"
        />
      </div>

      <div class="welcome-section">

        <h1>Vanguard Hospital Management System</h1>

        <p>
          Lorem ipsum dolor sit amet consectetur, adipisicing elit. Consequuntur, aut.
        </p>

      </div>

    </div>

    <!-- RIGHT SIDE -->
<div class="right-panel">
    <!--log in-->
    <div class="form-box" *ngIf="!showSignUp">

      <h2>Login</h2>

      <p class="subtitle">
        Enter your credentials to login
      </p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <div class="input-group">
          <label>Email</label>

          <input
            type="email"
            placeholder="Enter email"
            formControlName="email"
          />
        </div>

        <div class="input-group">
          <label>Password</label>

          <input
            type="password"
            placeholder="Enter password"
            formControlName="password"
          />
        </div>

        <div class="forgot-password">
          <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">
          Sign In
        </button>

      </form>

      <div class="signup-text">
        Don't have an account?
        <a (click)="showSignUp=true">Sign Up</a>
      </div>

    </div> 
    <!--sign up-->
    <div class="form-box" *ngIf="showSignUp">

  <h2>Sign Up</h2>

  <p class="subtitle">
    Create your account
  </p>

  <form [formGroup]="signupForm" (ngSubmit)="onSignup()">

  <div class="input-group">
    <label>Full Name</label>

    <input
      type="text"
      placeholder="Enter your name"
      formControlName="fullName"
    />
  </div>

  <div class="input-group">
    <label>Email</label>

    <input
      type="email"
      placeholder="Enter email"
      formControlName="email"
    />
  </div>

  <div class="input-group">
    <label>Password</label>

    <input
      type="password"
      placeholder="Create password"
      formControlName="password"
    />
  </div>

  <div class="input-group">
    <label>Confirm Password</label>

    <input
      type="password"
      placeholder="Confirm password"
      formControlName="confirmPassword"
    />

    <p
      *ngIf="passwordsDoNotMatch() && signupForm.get('confirmPassword')?.touched"
      style="color:red; font-size:14px; margin-top:6px;"
    >
      Passwords do not match
    </p>

  </div>

  <button
    type="submit"
    [disabled]="passwordsDoNotMatch()"
  >
    Create Account
  </button>

</form>

  <div class="signup-text">
    Already have an account?
    <a (click)="showSignUp = false">Login</a>
  </div>

    </div>

</div>

  </div>

</div>
