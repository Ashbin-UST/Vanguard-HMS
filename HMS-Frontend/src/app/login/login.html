<div class="page">
  <div class="login-container">

    <div class="left-panel">
      <div class="image-section">
        <img src="/loginpic2.jpg" alt="doctor" />
      </div>
      <div class="welcome-section">
        <h1>Vanguard Hospital Management System</h1>
        <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Consequuntur, aut.</p>
      </div>
    </div>

    <div class="right-panel">
      <div class="form-box">
        <h2>Login</h2>
        <p class="subtitle">Enter your credentials to login</p>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

          <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter email" formControlName="email" />
            <span class="error" *ngIf="emailInvalid">Enter a valid email</span>
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter password" formControlName="password" />
            <span class="error" *ngIf="passwordInvalid">Min 6 characters</span>
          </div>

          <div class="forgot-password">
            <a href="#">Forgot Password?</a>
          </div>

          <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

          <button type="submit">Sign In</button>

        </form>

        <div class="signup-text">
          Don't have an account?
          <a routerLink="/signup">Sign Up</a>
        </div>
      </div>
    </div>

  </div>
</div>
