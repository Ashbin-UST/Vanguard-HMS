<div class="employee-create-container">
  <div class="form-header">
    <h1>{{ isEditMode ? 'Edit Employee' : 'Add New Employee' }}</h1>
  </div>

  <div *ngIf="error" class="error-message">{{ error }}</div>

  <div *ngIf="loading" class="loading">Processing...</div>

  <form *ngIf="!loading" [formGroup]="employeeForm" (ngSubmit)="submitForm()" class="employee-form">
    <div class="form-group">
      <label for="name">Name <span class="required">*</span></label>
      <input
        type="text"
        id="name"
        formControlName="name"
        class="form-control"
        placeholder="Enter employee name"
      />
      <small *ngIf="employeeForm.get('name')?.invalid && employeeForm.get('name')?.touched" class="error">
        {{ getFieldError('name') }}
      </small>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="email">Email <span class="required">*</span></label>
        <input
          type="email"
          id="email"
          formControlName="email"
          class="form-control"
          placeholder="Enter email"
        />
        <small *ngIf="employeeForm.get('email')?.invalid && employeeForm.get('email')?.touched" class="error">
          {{ getFieldError('email') }}
        </small>
      </div>

      <div class="form-group">
        <label for="phone">Phone <span class="required">*</span></label>
        <input
          type="text"
          id="phone"
          formControlName="phone"
          class="form-control"
          placeholder="Enter 10-digit phone number"
        />
        <small *ngIf="employeeForm.get('phone')?.invalid && employeeForm.get('phone')?.touched" class="error">
          {{ getFieldError('phone') }}
        </small>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="department">Department <span class="required">*</span></label>
        <select id="department" formControlName="department" class="form-control">
          <option value="">Select Department</option>
          <option *ngFor="let dept of departments" [value]="dept">{{ dept }}</option>
        </select>
        <small *ngIf="employeeForm.get('department')?.invalid && employeeForm.get('department')?.touched" class="error">
          Department is required
        </small>
      </div>

      <div class="form-group">
        <label for="designation">Designation <span class="required">*</span></label>
        <select id="designation" formControlName="designation" class="form-control">
          <option value="">Select Designation</option>
          <option *ngFor="let des of designations" [value]="des">{{ des }}</option>
        </select>
        <small *ngIf="employeeForm.get('designation')?.invalid && employeeForm.get('designation')?.touched" class="error">
          Designation is required
        </small>
      </div>
    </div>

    <div class="form-group">
      <label for="qualifications">Qualifications</label>
      <textarea
        id="qualifications"
        formControlName="qualifications"
        class="form-control"
        placeholder="e.g., MBBS, MD in Cardiology"
        rows="3"
      ></textarea>
    </div>

    <div class="form-group">
      <label for="specialization">Specialization</label>
      <input
        type="text"
        id="specialization"
        formControlName="specialization"
        class="form-control"
        placeholder="e.g., Cardiology, General Practice"
      />
    </div>

    <div class="form-group">
      <label for="experience">Experience (Years)</label>
      <input
        type="number"
        id="experience"
        formControlName="experience"
        class="form-control"
        placeholder="e.g., 5"
      />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary" [disabled]="employeeForm.invalid">
        {{ isEditMode ? 'Update Employee' : 'Create Employee' }}
      </button>
      <button type="button" class="btn-secondary" (click)="cancelForm()">Cancel</button>
    </div>
  </form>
</div>
