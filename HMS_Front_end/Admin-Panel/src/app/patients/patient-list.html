<div class="patient-list-container">
  <div class="header">
    <h1>Patient Management</h1>
    <button class="btn-primary" (click)="createNewPatient()">+ Add New Patient</button>
  </div>

  <div class="search-bar">
    <input
      type="text"
      placeholder="Search by name, UHID, email, or phone..."
      [(ngModel)]="searchQuery"
      (keyup.enter)="searchPatients()"
      class="search-input"
    />
    <button class="btn-secondary" (click)="searchPatients()">Search</button>
  </div>

  <div *ngIf="error" class="error-message">{{ error }}</div>

  <div *ngIf="loading" class="loading">Loading patients...</div>

  <div *ngIf="!loading && patients.length === 0" class="no-data">
    No patients found
  </div>

  <table *ngIf="!loading && patients.length > 0" class="patients-table">
    <thead>
      <tr>
        <th>UHID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Gender</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let patient of patients">
        <td>{{ patient.UHID }}</td>
        <td>{{ patient.name }}</td>
        <td>{{ patient.email }}</td>
        <td>{{ patient.phone }}</td>
        <td>{{ patient.gender }}</td>
        <td>
          <span [ngClass]="patient.status === 'ACTIVE' ? 'badge-success' : 'badge-danger'">
            {{ patient.status }}
          </span>
        </td>
        <td>
          <button class="btn-view" (click)="viewPatient(patient._id!)">View</button>
          <button class="btn-edit" (click)="editPatient(patient._id!)">Edit</button>
          <button class="btn-delete" (click)="deletePatient(patient._id!)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && patients.length > 0" class="pagination">
    <button [disabled]="currentPage === 1" (click)="previousPage()" class="btn-pagination">
      Previous
    </button>
    <span class="page-info">Page {{ currentPage }} of {{ totalPages }}</span>
    <button
      [disabled]="currentPage === totalPages"
      (click)="nextPage()"
      class="btn-pagination"
    >
      Next
    </button>
  </div>
</div>
