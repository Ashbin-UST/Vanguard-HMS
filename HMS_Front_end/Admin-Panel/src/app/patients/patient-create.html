<div class="patient-form-container">
  <div class="form-header">
    <h1>{{ isEditing ? 'Edit Patient' : 'Create New Patient' }}</h1>
  </div>

  <div *ngIf="error" class="error-message">{{ error }}</div>

  <form [formGroup]="patientForm" (ngSubmit)="onSubmit()" class="patient-form">
    <div class="form-section">
      <h2>Personal Information</h2>

      <div class="form-group">
        <label for="name">Full Name *</label>
        <input
          id="name"
          type="text"
          formControlName="name"
          placeholder="Enter patient name"
          class="form-input"
        />
        <span *ngIf="patientForm.get('name')?.invalid && patientForm.get('name')?.touched" class="error-text">
          Name is required and must be at least 2 characters
        </span>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="email">Email *</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="Enter email"
            class="form-input"
          />
          <span *ngIf="patientForm.get('email')?.invalid && patientForm.get('email')?.touched" class="error-text">
            Valid email is required
          </span>
        </div>

        <div class="form-group">
          <label for="phone">Phone *</label>
          <input
            id="phone"
            type="tel"
            formControlName="phone"
            placeholder="Enter 10-digit phone number"
            class="form-input"
          />
          <span *ngIf="patientForm.get('phone')?.invalid && patientForm.get('phone')?.touched" class="error-text">
            Valid 10-digit phone number is required
          </span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="gender">Gender *</label>
          <select formControlName="gender" class="form-input">
            <option value="">Select gender</option>
            <option *ngFor="let gender of genderOptions" [value]="gender">
              {{ gender }}
            </option>
          </select>
          <span *ngIf="patientForm.get('gender')?.invalid && patientForm.get('gender')?.touched" class="error-text">
            Gender is required
          </span>
        </div>

        <div class="form-group">
          <label for="dob">Date of Birth *</label>
          <input
            id="dob"
            type="date"
            formControlName="dob"
            class="form-input"
          />
          <span *ngIf="patientForm.get('dob')?.invalid && patientForm.get('dob')?.touched" class="error-text">
            Date of birth is required
          </span>
        </div>
      </div>
    </div>

    <div class="form-section">
      <h2>Address Information</h2>

      <div class="form-row">
        <div class="form-group">
          <label for="houseName">House Name *</label>
          <input
            id="houseName"
            type="text"
            formControlName="houseName"
            placeholder="Enter house name"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="houseNumber">House Number *</label>
          <input
            id="houseNumber"
            type="text"
            formControlName="houseNumber"
            placeholder="Enter house number"
            class="form-input"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="city">City *</label>
          <input
            id="city"
            type="text"
            formControlName="city"
            placeholder="Enter city"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="postCode">Post Code *</label>
          <input
            id="postCode"
            type="text"
            formControlName="postCode"
            placeholder="Enter post code"
            class="form-input"
          />
        </div>
      </div>
    </div>

    <div class="form-section">
      <h2>Emergency Contact</h2>

      <div class="form-group">
        <label for="contactName">Contact Name *</label>
        <input
          id="contactName"
          type="text"
          formControlName="contactName"
          placeholder="Enter emergency contact name"
          class="form-input"
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="relationship">Relationship *</label>
          <input
            id="relationship"
            type="text"
            formControlName="relationship"
            placeholder="Enter relationship"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="contactNumber">Contact Number *</label>
          <input
            id="contactNumber"
            type="tel"
            formControlName="contactNumber"
            placeholder="Enter 10-digit phone number"
            class="form-input"
          />
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-group">
        <label for="status">Status *</label>
        <select formControlName="status" class="form-input">
          <option *ngFor="let status of statusOptions" [value]="status">
            {{ status }}
          </option>
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="loading" class="btn-submit">
        {{ loading ? 'Loading...' : (isEditing ? 'Update Patient' : 'Create Patient') }}
      </button>
      <button type="button" (click)="cancel()" class="btn-cancel">Cancel</button>
    </div>
  </form>
</div>
