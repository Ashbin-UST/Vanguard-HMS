<nav class="navbar">
    <div class="navbar-container">
        <a class="navbar-brand" (click)="onNavigate('/dashboard')" role="link" tabindex="0">
            <h2>HMS</h2>
        </a>

        <button class="hamburger" [class.active]="showMenu" (click)="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <div class="navbar-menu" [class.active]="showMenu">
            <div *ngIf="isLoggedIn" class="nav-links">
                <a class="nav-link" [class.active]="isActive('admin')" (click)="onNavigate('/admin')">
                    Dashboard
                </a>
                <a class="nav-link" [class.active]="isActive('patients')" (click)="onNavigate('/patients')">
                    Patients
                </a>
                <a class="nav-link" [class.active]="isActive('appointments')" (click)="onNavigate('/appointments')">
                    Appointments
                </a>
                <a class="nav-link" [class.active]="isActive('medical-records')"
                    (click)="onNavigate('/medical-records')">
                    Medical Records
                </a>
                <a class="nav-link" [class.active]="isActive('billing')" (click)="onNavigate('/billing')">
                    Billing
                </a>
                <a class="nav-link" [class.active]="isActive('employees')" (click)="onNavigate('/employees')">
                    Employees
                </a>

                <div class="nav-divider"></div>

                <div class="user-section">
                    <span class="user-name" *ngIf="currentUser">
                        {{ currentUser.name || 'User' }}
                    </span>
                    <button class="btn-logout" (click)="onLogout()">Logout</button>
                </div>
            </div>
        </div>
    </div>
