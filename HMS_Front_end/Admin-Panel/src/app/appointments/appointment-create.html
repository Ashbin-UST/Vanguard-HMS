<div class="appointment-form-container">
  <div class="form-header">
    <h1>{{ isEditing ? 'Edit Appointment' : 'Book New Appointment' }}</h1>
  </div>

  <div *ngIf="error" class="error-message">{{ error }}</div>

  <form [formGroup]="appointmentForm" (ngSubmit)="onSubmit()" class="appointment-form">
    <div class="form-section">
      <div class="form-group">
        <label for="patientId">Patient *</label>
        <select formControlName="patientId" class="form-input">
          <option value="">Select patient</option>
          <option *ngFor="let patient of patients" [value]="patient._id">
            {{ patient.name }} ({{ patient.UHID }})
          </option>
        </select>
        <span *ngIf="appointmentForm.get('patientId')?.invalid && appointmentForm.get('patientId')?.touched" class="error-text">
          Patient is required
        </span>
      </div>

      <div class="form-group">
        <label for="doctorEmployeeId">Doctor *</label>
        <select formControlName="doctorEmployeeId" class="form-input">
          <option value="">Select doctor</option>
          <option *ngFor="let doctor of doctors" [value]="doctor.employeeCode">
            {{ doctor.name }} ({{ doctor.specialization || 'General' }})
          </option>
        </select>
        <span *ngIf="appointmentForm.get('doctorEmployeeId')?.invalid && appointmentForm.get('doctorEmployeeId')?.touched" class="error-text">
          Doctor is required
        </span>
      </div>

      <div class="form-group">
        <label for="appointmentDate">Appointment Date *</label>
        <input
          id="appointmentDate"
          type="date"
          formControlName="appointmentDate"
          class="form-input"
        />
        <span *ngIf="appointmentForm.get('appointmentDate')?.invalid && appointmentForm.get('appointmentDate')?.touched" class="error-text">
          Appointment date is required
        </span>
      </div>

      <div class="form-group">
        <label for="timeSlot">Time Slot *</label>
        <select formControlName="timeSlot" class="form-input" [disabled]="availableSlots.length === 0">
          <option value="">
            {{ availableSlots.length > 0 ? 'Select time slot' : 'No slots available' }}
          </option>
          <option *ngFor="let slot of availableSlots" [value]="slot">
            {{ slot }}
          </option>
        </select>
        <span *ngIf="appointmentForm.get('timeSlot')?.invalid && appointmentForm.get('timeSlot')?.touched" class="error-text">
          Time slot is required
        </span>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="loading" class="btn-submit">
        {{ loading ? 'Loading...' : (isEditing ? 'Update Appointment' : 'Book Appointment') }}
      </button>
      <button type="button" (click)="cancel()" class="btn-cancel">Cancel</button>
    </div>
  </form>
</div>
